name: Release binaries

# Trigger: pushing a vX.Y.Z tag to this repo. Cross-compiles all 6
# platforms and attaches them to a GitHub Release. The tag is the release
# button — everything below is automated. To retry a failed run, fix the
# cause and re-run it (gh run rerun) — the tag ref is preserved.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify changelog has this version's section
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[v?${VER}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no [${GITHUB_REF_NAME}] section (still [Unreleased]?) — rename it, re-sync, re-tag. Refusing to release."
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build all platforms
        run: VERSION="$GITHUB_REF_NAME" make build-all

      - name: Generate checksums
        run: cd bin && sha256sum * > checksums.txt

      - name: Create GitHub Release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" '
            $0 ~ "^## \\[v?" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > /tmp/notes.md
          gh release create "$GITHUB_REF_NAME" ./bin/* \
            --title "Declaw CLI $GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md
